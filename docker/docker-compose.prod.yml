version: "3.8"

services:
  # 1. Nginx Reverse Proxy Gateway
  nginx:
    image: nginx:alpine
    container_name: nexusai_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # 2. FastAPI backend microservice (Production Profile)
  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: nexusai_backend_prod
    environment:
      - APP_NAME=NexusAI Orchestration Platform
      - DEBUG=False
      - SQLITE_DB_PATH=/app/data/nexusai.db
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434 # Route to sidecar container or host.docker.internal
      - CACHE_THRESHOLD=0.88
    volumes:
      - backend_db_prod:/app/data
      - backend_uploads_prod:/app/uploads
      - backend_models_prod:/app/models_cache
    depends_on:
      - chromadb
    restart: unless-stopped

  # 3. Next.js 14 frontend console (Production Profile)
  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    container_name: nexusai_frontend_prod
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend
    restart: unless-stopped

  # 4. ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: nexusai_chromadb_prod
    volumes:
      - chroma_vectors_prod:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  # 5. Ollama Runtime (Local fallback container)
  ollama:
    image: ollama/ollama:latest
    container_name: nexusai_ollama_prod
    volumes:
      - ollama_models_prod:/root/.ollama
    restart: unless-stopped

volumes:
  backend_db_prod:
  backend_uploads_prod:
  backend_models_prod:
  chroma_vectors_prod:
  ollama_models_prod:
